# conformist configuration (treefmt successor): the goimports -> gofumpt -> nixfmt
# -> shfmt formatter chain that produces this repo's canonical formatting, plus
# linters conformist runs natively (shellcheck). Run via `conformist` (repair) /
# `conformist check`.

# Generated / locked / prose — not formatted.
excludes = [
  "flake.lock",
  "go.sum",
  "gomod2nix.toml",
  "version.env",
  "sweatfile",
  "LICENSE",
  "*.md",
  "result",
  "result-*",
  ".tmp/**",
  # conformist's own config is TOML with intentional layout; leave it be.
  "conformist.toml",
]

# Go: goimports (priority 1) must run before gofumpt (priority 2) so the
# import-grouped output is re-canonicalized by gofumpt. -w so each writes in
# place (required for conformist's sandbox check to observe drift).
[formatter.goimports]
command = "goimports"
options = ["-w"]
includes = ["*.go"]
priority = 1

[formatter.gofumpt]
command = "gofumpt"
options = ["-w"]
includes = ["*.go"]
priority = 2

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

# Project shell style: 2-space indent, simplify, case-branch indent. -w writes.
[formatter.shfmt]
command = "shfmt"
options = ["-w", "-i", "2", "-s", "-ci"]
includes = ["*.sh", "*.bash", "*.bats"]

# TOML via tommy's CST-preserving formatter (`tommy fmt`). conformist.toml itself
# is excluded above (intentional layout).
[formatter.tommy]
command = "tommy"
options = ["fmt"]
includes = ["*.toml"]

# Linter: shellcheck runs read-only in `conformist check` (no autofix).
[linter.shellcheck]
command = "shellcheck"
includes = ["*.sh", "*.bash", "*.bats"]

# tommy codegen as a REPAIR linter: `conformist` / `nix fmt` / `conformist
# --commit` runs `tommy generate` for every `//go:generate tommy generate` source
# file (the blob_store_configs *_tommy.go), so regenerated codegen lands in the
# auto-fix chore. The driver self-gates on tommy + go (present in the devshell
# `just fmt` / `just lint-fmt` run under), so it is a no-op where the toolchain is
# absent. The CHECK command is a deliberate no-op (`true`) so `conformist check`
# never reports false codegen drift — `tommy generate --check` compares against
# tommy's raw render, which differs from the committed file once it is re-run
# through the formatter (see `just generate-tommy`); true staleness stays gated by
# that recipe. passes-files=false: the driver walks the tree for the directive.
[linter.tommy-codegen]
command = "true"
repair-command = "conformist-tommy-codegen"
includes = ["*.go", "**/*.go"]
passes-files = false
