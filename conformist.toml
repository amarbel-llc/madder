# Minimal on-disk conformist config: the formatter chain ONLY (goimports →
# gofumpt → nixfmt → shfmt) plus shellcheck. This is NOT the lint gate — the
# full eng-convention roster lives in the Nix-generated config (./conformist.nix
# + conformist.lib.presets.eng), which `just lint-fmt` / `just codemod-fmt` pass
# explicitly via --config-file and `nix fmt` bakes into its wrapper.
#
# This file exists for ONE reason: `dagnabit export` (the pkgs/ facade
# generator, `just lint-facades` / `just codemod-facades`) discovers the project
# formatter by walking UP the tree for a conformist.toml and runs it on its
# generated output. Without a conformist.toml at madder's root, dagnabit walks
# past it and finds the eng-root ~/eng/conformist.toml (which enables prettier),
# invoking the wrong formatter. So we keep a local one whose commands are bare
# names resolved from the devshell PATH (no /nix/store paths, unlike the
# generated config), and which dagnabit can invoke with its own --tree-root.
#
# Tracked for removal once dagnabit integrates with a Nix-generated conformist
# config directly: amarbel-llc/purse-first#159. When that lands, delete this
# file and drop the bare-conformist devShell shim.
#
# Keep the formatter set in sync with ./conformist.nix.

excludes = [
  "flake.lock",
  "go.sum",
  "gomod2nix.toml",
  "version.env",
  "sweatfile",
  "LICENSE",
  "*.md",
  "result",
  "result-*",
  ".tmp/**",
  "conformist.toml",
  "conformist.nix",
]

[formatter.goimports]
command = "goimports"
options = ["-w"]
includes = ["*.go"]
priority = 1

[formatter.gofumpt]
command = "gofumpt"
options = ["-w"]
includes = ["*.go"]
priority = 2

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

[formatter.shfmt]
command = "shfmt"
options = ["-w", "-i", "2", "-s", "-ci"]
includes = ["*.sh", "*.bash", "*.bats"]

[linter.shellcheck]
command = "shellcheck"
includes = ["*.sh", "*.bash", "*.bats"]
